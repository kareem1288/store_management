{% extends "templates/web.html" %}

{% block header %}{% endblock %}

{% block page_content %}
{% if frappe.session.user == 'Guest' %}
	<script>window.location.href = '/login?redirect-to=/pos';</script>
{% else %}
<div class="sm-masters-app" id="sm-masters-app">
	<!-- Top Navigation -->
	<div class="sm-top-nav">
		<a href="/masters" class="sm-nav-link active">Masters</a>
		<a href="/pos" class="sm-nav-link">POS</a>
	</div>

	<section class="sm-masters-shell">
		<!-- Sidebar Navigation -->
		<aside class="sm-masters-sidebar">
			<div class="sm-sidebar-header">
				<h2>Masters</h2>
				<p>Manage Core Data</p>
			</div>
			<nav class="sm-masters-nav">
				<button class="sm-nav-item active" data-doctype="Item" onclick="selectDoctype('Item')">
					📦 Items
				</button>
				<button class="sm-nav-item" data-doctype="Item Group" onclick="selectDoctype('Item Group')">
					📂 Item Groups
				</button>
				<button class="sm-nav-item" data-doctype="Customer" onclick="selectDoctype('Customer')">
					👤 Customers
				</button>
				<button class="sm-nav-item" data-doctype="Customer Group" onclick="selectDoctype('Customer Group')">
					👥 Customer Groups
				</button>
				<button class="sm-nav-item" data-doctype="Item Tax Template" onclick="selectDoctype('Item Tax Template')">
					🏷️ Tax Templates
				</button>
				<button class="sm-nav-item" data-doctype="Company" onclick="selectDoctype('Company')">
					🏢 Companies
				</button>
				<button class="sm-nav-item" data-doctype="User" onclick="selectDoctype('User')">
					👨‍💼 Users
				</button>
			</nav>
		</aside>

<!-- Main Content -->
		<main class="sm-masters-content">
			<div class="sm-masters-toolbar">
				<div>
					<h1 id="doctype-title">Items</h1>
					<p id="doctype-desc">Manage product items</p>
				</div>
				<div class="sm-toolbar-actions">
					<div class="sm-search-box">
						<input 
							type="text" 
							id="search-input" 
							class="sm-search-input" 
							placeholder="Search..." 
							oninput="handleSearch(this.value)"
						>
						<span class="sm-search-icon">🔍</span>
					</div>
					<button class="sm-masters-btn sm-btn-primary" onclick="openCreateForm()">
						+ New Record
					</button>
				</div>
			</div>

			<!-- List View -->
			<div class="sm-masters-list" id="masters-list"></div>
		</main>
	</section>

	<!-- Modal Overlay -->
	<div class="sm-masters-modal-backdrop" id="modal-backdrop" onclick="closeModal()"></div>

	<!-- Create/Edit Modal -->
	<div class="sm-masters-modal" id="masters-modal" aria-hidden="true">
		<div class="sm-modal-header">
			<h2 id="modal-title">New Record</h2>
			<button class="sm-modal-close" onclick="closeModal()">✕</button>
		</div>
		<div class="sm-modal-body" id="modal-form-container"></div>
		<div class="sm-modal-footer">
			<button class="sm-masters-btn sm-btn-secondary" onclick="closeModal()">Cancel</button>
			<button class="sm-masters-btn sm-btn-primary" onclick="saveRecord()">Save</button>
		</div>
	</div>
</div>

<style>
@import url("https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap");

	--sm-primary: #2563eb;
	--sm-primary-dark: #1d4ed8;
	--sm-success: #16a34a;
	--sm-danger: #dc2626;
	--sm-bg: #f8fafc;

	--sm-border: rgba(15, 23, 42, 0.1);

	--sm-muted: #64748b;

}

body.store-masters-page {
	background: var(--sm-bg);
	font-family: "Manrope", sans-serif;
	color: var(--sm-text);
}

/* Top Navigation */
.sm-top-nav {

	gap: 0.5rem;
	padding: 1rem 2rem;

	border-bottom: 1px solid rgba(15, 23, 42, 0.1);
}

.sm-nav-link {

	font-size: 0.95rem;

}

.sm-nav-link:hover {

}

.sm-nav-link.active {
	background: #eff6ff;

}

.sm-masters-app {

}

.sm-masters-shell {

}

.sm-sidebar-header h2 {

}

.sm-sidebar-header p {

}

.sm-masters-nav {

}

.sm-nav-item {

.sm-search-input {

	pointer-events: none;

}

.sm-masters-modal.open {
	transform: translate(-50%, -50%) scale(1);
	opacity: 1;
	pointer-events: auto;
}

.sm-modal-header {
	display: flex;
	justify-content: space-between;
	align-items: center;
	padding: 1.5rem;
	border-bottom: 1px solid var(--sm-border);
}

.sm-modal-header h2 {

	font-size: 1.3rem;

}

.sm-modal-close {

}

}

.sm-modal-body {

}

.sm-form-label {

.sm-form-input,

.sm-form-input:focus,
.sm-form-select:focus,

<script>
const mastersDoctypes = {
	'Item': {
		title: 'Items',
		desc: 'Manage product items',
		fields: ['name', 'item_name', 'item_group'],
		searchField: 'item_name',
		defaults: {
			item_group: 'All Item Groups',
			stock_uom: 'Nos'
		},
		formFields: [
			{ name: 'item_code', label: 'Item Code', type: 'text', required: true },
			{ name: 'item_name', label: 'Item Name', type: 'text', required: true },
			{ name: 'item_group', label: 'Item Group', type: 'link', doctype: 'Item Group', required: true },
			{ name: 'stock_uom', label: 'UOM', type: 'link', doctype: 'UOM', required: true },
			{ name: 'is_stock_item', label: 'Is Stock Item', type: 'checkbox', fullWidth: true, checked: true },
			{ name: 'opening_stock', label: 'Opening Stock', type: 'number' },
			{ name: 'standard_rate', label: 'Standard Rate', type: 'currency' },
			{ name: 'image', label: 'Item Image', type: 'image', fullWidth: true }
		]
	},
	'Item Group': {
		title: 'Item Groups',
		desc: 'Manage item categories',
		fields: ['name', 'item_group_name', 'parent_item_group']
	},
	'Customer': {
		title: 'Customers',
		desc: 'Manage customer records',
		fields: ['name', 'customer_name', 'customer_group','customer_type','territory']
	},
	'Customer Group': {
		title: 'Customer Groups',
		desc: 'Manage customer categories',
		fields: ['name', 'customer_group_name', 'parent_customer_group']
	},
	'Item Tax Template': {
		title: 'Tax Templates',
		desc: 'Manage tax templates',
		fields: ['name', 'title', 'description']
	},
	'Company': {
		title: 'Companies',
		desc: 'Manage companies',
		fields: ['name', 'default_currency', 'country','company_name']
	},
	'User': {
		title: 'Users',
		desc: 'Manage user accounts',
		fields: ['name', 'full_name', 'email']
	}
};

let currentDoctype = 'Item';
let currentRecords = [];
let currentFormData = {};
let editingRecord = null;
let searchQuery = '';
let linkOptionCache = {};

frappe.ready(() => {
	if (frappe.session.user === 'Guest') {
		window.location.href = '/app/login';
		return;
	}

	document.addEventListener('click', handleOutsideDropdownClick);

	loadRecords('Item');
});

function selectDoctype(doctype) {
	currentDoctype = doctype;
	editingRecord = null;
	currentFormData = {};
	searchQuery = '';
	document.getElementById('search-input').value = '';

	// Update UI
	document.querySelectorAll('.sm-nav-item').forEach(item => {
		item.classList.toggle('active', item.dataset.doctype === doctype);
	});

	const config = mastersDoctypes[doctype];
	document.getElementById('doctype-title').textContent = config.title;
	document.getElementById('doctype-desc').textContent = config.desc;

	loadRecords(doctype);
}

function handleSearch(query) {
	searchQuery = query.trim().toLowerCase();
	renderList();
}

function loadRecords(doctype) {
	frappe.call({
		method: 'store_management.api.get_master_records',
		args: { doctype: doctype },
		callback: function(response) {
			currentRecords = response.message || [];
			renderList();
		}
	});
}

function renderList() {
	const container = document.getElementById('masters-list');
	const config = mastersDoctypes[currentDoctype];
	const fields = config.fields;

	// Filter records based on search query
	let filteredRecords = currentRecords;
	if (searchQuery) {
		const searchField = config.searchField || 'name';
		filteredRecords = currentRecords.filter(record => {
			// Search in name field
			if (record.name && record.name.toLowerCase().includes(searchQuery)) {
				return true;
			}
			// Search in the designated search field (e.g., item_name for Items)
			if (searchField && record[searchField] && String(record[searchField]).toLowerCase().includes(searchQuery)) {
				return true;
			}
			return false;
		});
	}

	if (!filteredRecords.length) {
		const message = searchQuery 
			? `No matching records found for "${searchQuery}"`
			: `No records found. Click "New Record" to create your first ${config.title.toLowerCase()}`;
		container.innerHTML = `
			<div class="sm-empty-message">
				<strong>${searchQuery ? 'No results' : 'No records found'}</strong>
				<p>${message}</p>
			</div>
		`;
		return;
	}

	// Build column headers
	const columnLabels = {
		'name': 'ID',
		'item_name': 'Item Name',
		'item_group': 'Item Group',
		'item_group_name': 'Item Group Name',
		'parent_item_group': 'Parent Item Group',
		'customer_name': 'Customer Name',
		'customer_group': 'Customer Group',
		'customer_group_name': 'Customer Group Name',
		'parent_customer_group': 'Parent Customer Group',
		'title': 'Title',
		'description': 'Description',
		'company_name': 'Company Name',
		'default_currency': 'Default Currency',
		'country': 'Country',
		'full_name': 'Full Name',
		'email': 'Email',
		'user_type': 'User Type'
	};
	
const displayFields = fields.slice(0, 3);
	const headers = displayFields.map(f => `<div>${columnLabels[f] || f}</div>`).join('');
	const headersWithActions = headers + '<div>Actions</div>';

	const rows = filteredRecords.map(record => {
		const cells = displayFields.map(field => {
			return `<div class="sm-table-cell">${escapeHtml(String(record[field] || '-'))}</div>`;
		}).join('');
		return `
			<div class="sm-table-row">
				${cells}
				<div class="sm-table-actions">
					<button class="sm-action-btn" onclick="editRecord('${escapeAttr(record.name)}')">Edit</button>
					<button class="sm-action-btn delete" onclick="deleteRecord('${escapeAttr(record.name)}')">Delete</button>
				</div>
			</div>
		`;
	}).join('');

	container.innerHTML = `
		<div class="sm-list-table">
			<div class="sm-table-head">${headersWithActions}</div>
			${rows}
		</div>
	`;
}

function openCreateForm() {
	editingRecord = null;
	currentFormData = { ...(mastersDoctypes[currentDoctype]?.defaults || {}) };
	renderForm();
	openModal();
}

function editRecord(name) {
	frappe.call({
		method: 'store_management.api.get_master_record',
		args: { doctype: currentDoctype, name: name },
		callback: function(response) {
			editingRecord = name;
			currentFormData = response.message || {};
			renderForm();
			openModal();
		}
	});
}

function renderForm() {
	const config = mastersDoctypes[currentDoctype];
	const container = document.getElementById('modal-form-container');
	const title = editingRecord ? `Edit ${currentDoctype}` : `New ${currentDoctype}`;

	document.getElementById('modal-title').textContent = title;

	// Check if doctype has custom formFields configuration
	let formFields;
	if (config.formFields) {
		formFields = renderCustomFormFields(config.formFields);
	} else {
		// Fallback to simple field rendering
		formFields = config.fields.map(field => {
			const value = currentFormData[field] || '';
			return `
				<div class="sm-form-group">
					<label class="sm-form-label">${field}</label>
					<input 
						type="text" 
						class="sm-form-input" 
						data-field="${field}" 
						value="${escapeAttr(String(value))}"
						placeholder="Enter ${field}"
					>
				</div>
			`;
		}).join('');
	}

	container.innerHTML = formFields;
}

function renderCustomFormFields(fields) {
	let html = '<div class="sm-form-row">';
	
	fields.forEach((field, index) => {
		const value = currentFormData[field.name] || '';
		const isFullWidth = field.fullWidth === true;
		
		html += `<div class="sm-form-group${isFullWidth ? ' full-width' : ''}">`;
		
if (field.type === 'checkbox') {
			// Use saved value if exists, otherwise use default checked property
			const isChecked = (value === true || value === 1 || value === '1') ? true : (value === false || value === 0 || value === '0') ? false : (field.checked === true);
			html += `
				<label class="sm-form-checkbox">
					<input 
						type="checkbox" 
						data-field="${field.name}" 
						${isChecked ? 'checked' : ''}
					>
					<span>${field.label}</span>
				</label>
			`;
		} else if (field.type === 'link') {
			html += `
				<label class="sm-form-label">${field.label}${field.required ? '<span class="required">*</span>' : ''}</label>
				<div class="sm-link-input" data-link-doctype="${field.doctype}" data-field="${field.name}">
					<button type="button" class="sm-link-btn" onclick="openLinkDropdown('${field.name}')">
						<span class="${value ? 'sm-link-value' : 'sm-link-placeholder'}">${value || 'Select ' + field.label + '...'}</span>
						<span>▾</span>
					</button>
					<div class="sm-link-dropdown" id="dropdown-${field.name}"></div>
					<input type="hidden" data-field="${field.name}" value="${escapeAttr(String(value))}">
				</div>
			`;
		} else if (field.type === 'image') {
			const imageUrl = String(value || '').trim();
			html += `
				<label class="sm-form-label">${field.label}${field.required ? '<span class="required">*</span>' : ''}</label>
				<div class="sm-image-field">
					<div class="sm-image-preview" id="preview-${field.name}">
						${imageUrl ? `<img src="${escapeAttr(imageUrl)}" alt="${escapeAttr(field.label)}">` : '<div class="sm-image-placeholder">No image selected</div>'}
					</div>
					<div class="sm-image-actions">
						<button type="button" class="sm-image-btn" onclick="openImageUploader('${field.name}')">Upload Image</button>
						<button type="button" class="sm-image-btn" onclick="clearImageField('${field.name}')">Clear</button>
					</div>
					<input
						type="text"
						class="sm-form-input"
						data-field="${field.name}"
						value="${escapeAttr(imageUrl)}"
						placeholder="Image URL or file path"
						oninput="updateImagePreview('${field.name}', this.value)"
					>
				</div>
			`;
		} else {
			const inputType = field.type === 'number' || field.type === 'currency' ? field.type : 'text';
			const inputClass = field.type === 'number' || field.type === 'currency' ? `sm-form-input ${inputType}` : 'sm-form-input';
			html += `
				<label class="sm-form-label">${field.label}${field.required ? '<span class="required">*</span>' : ''}</label>
				<input 
					type="${inputType}" 
					class="${inputClass}" 
					data-field="${field.name}" 
					value="${escapeAttr(String(value))}"
					placeholder="Enter ${field.label}"
					${field.required ? 'required' : ''}
				>
			`;
		}
		
		html += '</div>';
		
		// Handle row breaks: fullWidth fields get their own row, otherwise pair fields
		if ((index + 1) % 2 === 0 || isFullWidth) {
			html += '</div><div class="sm-form-row">';
		}
	});
	
	html += '</div>';
	return html;
}

function openImageUploader(fieldName) {
	if (!frappe.ui || !frappe.ui.FileUploader) {
		frappe.msgprint('File uploader is not available in this context.');
		return;
	}

	new frappe.ui.FileUploader({
		allow_multiple: false,
		restrictions: {
			allowed_file_types: ['image/*']
		},
		on_success(file) {
			const input = document.querySelector(`input[data-field="${fieldName}"]`);
			if (!input) return;

			const fileUrl = file.file_url || file.file_name || '';
			input.value = fileUrl;
			updateImagePreview(fieldName, fileUrl);
		}
	});
}

function clearImageField(fieldName) {
	const input = document.querySelector(`input[data-field="${fieldName}"]`);
	if (!input) return;

	input.value = '';
	updateImagePreview(fieldName, '');
}

function updateImagePreview(fieldName, value) {
	const preview = document.getElementById(`preview-${fieldName}`);
	if (!preview) return;

	const imageUrl = String(value || '').trim();
	preview.innerHTML = imageUrl
		? `<img src="${escapeAttr(imageUrl)}" alt="${escapeAttr(fieldName)}">`
		: '<div class="sm-image-placeholder">No image selected</div>';
}

let linkSearchTimeout = null;

function openLinkDropdown(fieldName) {
	const dropdown = document.getElementById(`dropdown-${fieldName}`);
	closeAllLinkDropdowns(fieldName);

	if (dropdown.classList.contains('open')) {
		dropdown.classList.remove('open');
		return;
	}

	const linkInput = document.querySelector(`.sm-link-input[data-field="${fieldName}"]`);
	if (!linkInput) return;

	const hiddenInput = linkInput.querySelector('input[type="hidden"]');
	const doctype = linkInput.dataset.linkDoctype;
	const currentValue = hiddenInput ? hiddenInput.value : '';
	
	// Clear any existing timeout
	if (linkSearchTimeout) clearTimeout(linkSearchTimeout);
	
	// Debounce the API call
	linkSearchTimeout = setTimeout(() => {
		frappe.call({
			method: 'store_management.api.get_master_records',
			args: { doctype: doctype },
			callback: function(response) {
				const records = response.message || [];
				linkOptionCache[fieldName] = records.map(record => record.name);
				dropdown.innerHTML = `
					<div class="sm-link-search">
						<input
							type="text"
							class="sm-link-search-input"
							placeholder="Search ${escapeAttr(doctype)}"
							oninput="filterLinkOptions('${fieldName}', this.value)"
							onclick="event.stopPropagation()"
						>
					</div>
					<div class="sm-link-options" id="options-${fieldName}">
						${buildLinkOptionsHtml(fieldName, linkOptionCache[fieldName], currentValue)}
					</div>
				`;
				dropdown.classList.add('open');
				const searchInput = dropdown.querySelector('.sm-link-search-input');
				if (searchInput) searchInput.focus();
			}
		});
	}, 150);
}

function buildLinkOptionsHtml(fieldName, names, currentValue) {
	if (!names || !names.length) {
		return '<div class="sm-link-option">No records found</div>';
	}

	return names.map(name => {
		const isSelected = name === currentValue;
		return `<div class="sm-link-option${isSelected ? ' selected' : ''}" onclick="selectLinkOption('${fieldName}', '${escapeAttr(name)}')">${escapeHtml(name)}</div>`;
	}).join('');
}

function filterLinkOptions(fieldName, query) {
	const optionsWrap = document.getElementById(`options-${fieldName}`);
	const linkInput = document.querySelector(`.sm-link-input[data-field="${fieldName}"]`);
	const hiddenInput = linkInput ? linkInput.querySelector('input[type="hidden"]') : null;
	const currentValue = hiddenInput ? hiddenInput.value : '';
	const allNames = linkOptionCache[fieldName] || [];
	const normalizedQuery = String(query || '').trim().toLowerCase();
	const filteredNames = normalizedQuery
		? allNames.filter(name => String(name || '').toLowerCase().includes(normalizedQuery))
		: allNames;

	if (optionsWrap) {
		optionsWrap.innerHTML = buildLinkOptionsHtml(fieldName, filteredNames, currentValue);
	}
}

function selectLinkOption(fieldName, value) {
	const linkInput = document.querySelector(`.sm-link-input[data-field="${fieldName}"]`);
	if (!linkInput) return;

	const hiddenInput = linkInput.querySelector('input[type="hidden"]');
	const btn = linkInput.querySelector('.sm-link-btn');
	const textSpan = btn.querySelector('span');

	if (hiddenInput) {
		hiddenInput.value = value;
	}

	if (textSpan) {
		textSpan.className = value ? 'sm-link-value' : 'sm-link-placeholder';
		textSpan.textContent = value || 'Select...';
	}

	const dropdown = document.getElementById(`dropdown-${fieldName}`);
	dropdown.classList.remove('open');
}

function closeAllLinkDropdowns(exceptFieldName = null) {
	document.querySelectorAll('.sm-link-dropdown.open').forEach(dropdown => {
		if (exceptFieldName && dropdown.id === `dropdown-${exceptFieldName}`) {
			return;
		}
		dropdown.classList.remove('open');
	});
}

function handleOutsideDropdownClick(event) {
	if (event.target.closest('.sm-link-input')) {
		return;
	}
	closeAllLinkDropdowns();
}

function saveRecord() {
	const config = mastersDoctypes[currentDoctype];
	const formData = {};

document.querySelectorAll('input[data-field], textarea[data-field], select[data-field]').forEach(input => {
		let val = input.value;
		// Handle checkbox inputs
		if (input.type === 'checkbox') {
			val = input.checked ? 1 : 0;
		} else {
			val = val.trim();
		}
		formData[input.dataset.field] = val;
	});

	const method = editingRecord 
		? 'store_management.api.update_master_record'
		: 'store_management.api.create_master_record';

	const args = {
		doctype: currentDoctype,
		...formData
	};

	if (editingRecord) {
		args.name = editingRecord;
	}

	frappe.call({
		method: method,
		args: args,
		callback: function(response) {
			if (response.message) {
				frappe.show_alert({
					message: `${currentDoctype} ${editingRecord ? 'updated' : 'created'} successfully`,
					indicator: 'green'
				});
				closeModal();
				loadRecords(currentDoctype);
			}
		}
	});
}

function deleteRecord(name) {
	if (!confirm(`Are you sure you want to delete this record?`)) return;

	frappe.call({
		method: 'store_management.api.delete_master_record',
		args: { doctype: currentDoctype, name: name },
		callback: function(response) {
			frappe.show_alert({
				message: `${currentDoctype} deleted successfully`,
				indicator: 'green'
			});
			loadRecords(currentDoctype);
		}
	});
}

function openModal() {
	document.getElementById('masters-modal').classList.add('open');
	document.getElementById('modal-backdrop').classList.add('open');
}

function closeModal() {
	document.getElementById('masters-modal').classList.remove('open');
	document.getElementById('modal-backdrop').classList.remove('open');
	editingRecord = null;
	currentFormData = {};
}

function escapeHtml(str) {
	return String(str || '')
		.replace(/&/g, '&amp;')
		.replace(/</g, '&lt;')
		.replace(/>/g, '&gt;')
		.replace(/"/g, '&quot;')
		.replace(/'/g, '&#39;');
}

function escapeAttr(str) {
	return String(str || '')
		.replace(/"/g, '&quot;')
		.replace(/'/g, '&#39;');
}
</script>
{% endif %}
{% endblock %}
