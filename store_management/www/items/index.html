{% extends "templates/web.html" %}

{% block header %}{% endblock %}

{% block page_content %}
{% if frappe.session.user == 'Guest' %}
	<script>window.location.href = '/app/login';</script>
{% else %}
<div class="sm-masters-app">
	<div class="sm-masters-header">
		<div class="sm-header-content">
			<div>
				<h1>📦 Items</h1>
				<p>Manage your product items</p>
			</div>
			<button class="sm-btn-primary" onclick="openCreateForm()">+ New Item</button>
		</div>
	</div>

	
	<main class="sm-masters-content">
		<div class="sm-list-container" id="items-list"></div>
	</main>

	<!-- Modal -->
	<div class="sm-modal-backdrop" id="modal-backdrop" onclick="closeModal()"></div>
	<div class="sm-modal" id="item-modal" aria-hidden="true">
		<div class="sm-modal-header">
			<h2 id="modal-title">New Item</h2>
			<button class="sm-modal-close" onclick="closeModal()">✕</button>
		</div>
		<div class="sm-modal-body" id="modal-form"></div>
		<div class="sm-modal-footer">
			<button class="sm-btn-secondary" onclick="closeModal()">Cancel</button>
			<button class="sm-btn-primary" onclick="saveItem()">Save</button>
		</div>
	</div>
</div>

<style>
@import url("https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap");

* {
	margin: 0;
	padding: 0;
	box-sizing: border-box;
}

body {
	background: #f8fafc;
	font-family: "Manrope", sans-serif;
	color: #1e293b;
}

.sm-masters-app {
	min-height: 100vh;
	display: flex;
	flex-direction: column;
}

.sm-masters-header {
	background: white;
	border-bottom: 1px solid rgba(15, 23, 42, 0.1);
	padding: 2rem;
	box-shadow: 0 1px 3px rgba(15, 23, 42, 0.05);
}

.sm-header-content {
	max-width: 1400px;
	margin: 0 auto;
	width: 100%;
	display: flex;
	justify-content: space-between;
	align-items: center;
	gap: 2rem;
}

.sm-masters-header h1 {
	font-size: 2rem;
	font-weight: 800;
	margin-bottom: 0.3rem;
}

.sm-masters-header p {
	color: #64748b;
	font-size: 0.95rem;
}

.sm-masters-content {
	flex: 1;
	padding: 2rem;
	max-width: 1400px;
	margin: 0 auto;
	width: 100%;
}

.sm-list-container {
	background: white;
	border-radius: 12px;
	border: 1px solid rgba(15, 23, 42, 0.1);
	overflow: hidden;
}

.sm-list-table {
	width: 100%;
}

.sm-table-head {
	display: grid;
	grid-template-columns: 1fr 1fr 1fr 200px;
	gap: 1rem;
	padding: 1rem;
	background: #f8fafc;
	border-bottom: 1px solid rgba(15, 23, 42, 0.1);
	font-weight: 700;
	font-size: 0.9rem;
	color: #64748b;
}

.sm-table-row {
	display: grid;
	grid-template-columns: 1fr 1fr 1fr 200px;
	gap: 1rem;
	padding: 1rem;
	border-bottom: 1px solid rgba(15, 23, 42, 0.05);
	align-items: center;
	transition: background 0.2s ease;
}

.sm-table-row:hover {
	background: #f8fafc;
}

.sm-table-row:last-child {
	border-bottom: 0;
}

.sm-table-actions {
	display: flex;
	gap: 0.5rem;
	justify-content: flex-end;
}

.sm-action-btn {
	padding: 0.5rem 0.75rem;
	border: 1px solid rgba(15, 23, 42, 0.1);
	background: white;
	color: #1e293b;
	border-radius: 8px;
	cursor: pointer;
	font-size: 0.9rem;
	font-weight: 600;
	transition: all 0.2s ease;
}

.sm-action-btn:hover {
	border-color: #2563eb;
	color: #2563eb;
	background: #eff6ff;
}

.sm-action-btn.delete:hover {
	border-color: #dc2626;
	color: #dc2626;
	background: #fee2e2;
}

.sm-empty-message {
	text-align: center;
	padding: 3rem 2rem;
	color: #64748b;
}

.sm-empty-message strong {
	display: block;
	margin-bottom: 0.5rem;
	color: #1e293b;
	font-size: 1.1rem;
}

.sm-btn-primary {
	padding: 0.75rem 1.25rem;
	background: linear-gradient(135deg, #2563eb, #1d4ed8);
	color: white;
	border: 0;
	border-radius: 10px;
	cursor: pointer;
	font-weight: 700;
	font-size: 1rem;
	box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
	transition: all 0.2s ease;
	white-space: nowrap;
}

.sm-btn-primary:hover {
	transform: translateY(-2px);
	box-shadow: 0 6px 16px rgba(37, 99, 235, 0.4);
}

.sm-btn-secondary {
	padding: 0.75rem 1.25rem;
	background: #f8fafc;
	color: #1e293b;
	border: 1px solid rgba(15, 23, 42, 0.1);
	border-radius: 10px;
	cursor: pointer;
	font-weight: 700;
	font-size: 1rem;
}

.sm-btn-secondary:hover {
	background: #eff6ff;
	border-color: #2563eb;
	color: #2563eb;
}

/* Modal Styles */
.sm-modal-backdrop {
	position: fixed;
	inset: 0;
	background: rgba(15, 23, 42, 0.4);
	backdrop-filter: blur(4px);
	opacity: 0;
	pointer-events: none;
	transition: opacity 0.2s ease;
	z-index: 99;
}

.sm-modal-backdrop.open {
	opacity: 1;
	pointer-events: auto;
}

.sm-modal {
	position: fixed;
	top: 50%;
	left: 50%;
	transform: translate(-50%, -50%) scale(0.95);
	width: min(600px, 90vw);
	max-height: 85vh;
	background: white;
	border-radius: 16px;
	box-shadow: 0 20px 60px rgba(15, 23, 42, 0.3);
	display: grid;
	grid-template-rows: auto 1fr auto;
	opacity: 0;
	pointer-events: none;
	transition: all 0.2s ease;
	z-index: 100;
}

.sm-modal.open {
	transform: translate(-50%, -50%) scale(1);
	opacity: 1;
	pointer-events: auto;
}

.sm-modal-header {
	display: flex;
	justify-content: space-between;
	align-items: center;
	padding: 1.5rem;
	border-bottom: 1px solid rgba(15, 23, 42, 0.1);
}

.sm-modal-header h2 {
	font-size: 1.3rem;
	font-weight: 800;
}

.sm-modal-close {
	background: transparent;
	border: 0;
	font-size: 1.5rem;
	cursor: pointer;
	color: #64748b;
}

.sm-modal-body {
	padding: 1.5rem;
	overflow-y: auto;
	display: grid;
	gap: 1rem;
}

.sm-form-group {
	display: grid;
	gap: 0.4rem;
}

.sm-form-label {
	font-weight: 700;
	font-size: 0.95rem;
}

.sm-form-input,
.sm-form-select {
	padding: 0.75rem;
	border: 1px solid rgba(15, 23, 42, 0.1);
	border-radius: 8px;
	font-size: 1rem;
	font-family: inherit;
	transition: all 0.2s ease;
}

.sm-form-input:focus,
.sm-form-select:focus {
	outline: 0;
	border-color: #2563eb;
	box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
}

.sm-modal-footer {
	display: flex;
	gap: 1rem;
	justify-content: flex-end;
	padding: 1.5rem;
	border-top: 1px solid rgba(15, 23, 42, 0.1);
}

.sm-modal-footer .sm-btn-primary,
.sm-modal-footer .sm-btn-secondary {
	min-width: 120px;
}

@media (max-width: 768px) {
	.sm-header-content {
		flex-direction: column;
		align-items: flex-start;
	}

	.sm-table-head,
	.sm-table-row {
		grid-template-columns: 1fr;
		gap: 0.5rem;
	}

	.sm-table-row > div:nth-child(n+2) {
		display: none;
	}

	.sm-table-actions {
		grid-column: 1;
		justify-content: flex-start;
	}
}
</style>

<script>
let currentItem = null;
let allItems = [];

frappe.ready(() => {
	if (frappe.session.user === 'Guest') {
		window.location.href = '/app/login';
		return;
	}
	loadItems();
});

function loadItems() {
	frappe.call({
		method: 'store_management.api.get_master_records',
		args: { doctype: 'Item' },
		callback: function(response) {
			allItems = response.message || [];
			renderList();
		}
	});
}

function renderList() {
	const container = document.getElementById('items-list');

	if (!allItems.length) {
		container.innerHTML = `
			<div class="sm-empty-message">
				<strong>No items found</strong>
				<p>Click "New Item" to create your first item</p>
			</div>
		`;
		return;
	}

	const rows = allItems.map(item => `
		<div class="sm-table-row">
			<div>${escapeHtml(item.name || '')}</div>
			<div>${escapeHtml(item.item_name || '')}</div>
			<div>${escapeHtml(item.item_group || '')}</div>
			<div class="sm-table-actions">
				<button class="sm-action-btn" onclick="editItem('${escapeAttr(item.name)}')">Edit</button>
				<button class="sm-action-btn delete" onclick="deleteItem('${escapeAttr(item.name)}')">Delete</button>
			</div>
		</div>
	`).join('');

	container.innerHTML = `
		<div class="sm-list-table">
			<div class="sm-table-head">
				<div>Item Code</div>
				<div>Item Name</div>
				<div>Item Group</div>
				<div>Actions</div>
			</div>
			${rows}
		</div>
	`;
}

function openCreateForm() {
	currentItem = null;
	renderForm();
	openModal();
}

function editItem(name) {
	frappe.call({
		method: 'store_management.api.get_master_record',
		args: { doctype: 'Item', name: name },
		callback: function(response) {
			currentItem = response.message;
			renderForm();
			openModal();
		}
	});
}

function renderForm() {
	const form = document.getElementById('modal-form');
	const title = currentItem ? `Edit Item: ${currentItem.name}` : 'New Item';
	document.getElementById('modal-title').textContent = title;

	const itemCode = currentItem ? currentItem.name : '';
	const itemName = currentItem ? currentItem.item_name : '';
	const itemGroup = currentItem ? currentItem.item_group : '';
	const rate = currentItem ? currentItem.standard_rate : '';

	form.innerHTML = `
		<div class="sm-form-group">
			<label class="sm-form-label">Item Code</label>
			<input type="text" class="sm-form-input" id="item_code" value="${escapeAttr(itemCode)}" placeholder="e.g., ITEM001" ${currentItem ? 'disabled' : ''}>
		</div>
		<div class="sm-form-group">
			<label class="sm-form-label">Item Name</label>
			<input type="text" class="sm-form-input" id="item_name" value="${escapeAttr(itemName)}" placeholder="Product name">
		</div>
		<div class="sm-form-group">
			<label class="sm-form-label">Item Group</label>
			<input type="text" class="sm-form-input" id="item_group" value="${escapeAttr(itemGroup)}" placeholder="e.g., Electronics">
		</div>
		<div class="sm-form-group">
			<label class="sm-form-label">Standard Rate</label>
			<input type="number" class="sm-form-input" id="standard_rate" value="${rate}" placeholder="0.00" step="0.01">
		</div>
	`;
}

function saveItem() {
	const itemCode = document.getElementById('item_code').value.trim();
	const itemName = document.getElementById('item_name').value.trim();
	const itemGroup = document.getElementById('item_group').value.trim();
	const rate = document.getElementById('standard_rate').value.trim();

	if (!itemCode || !itemName) {
		frappe.show_alert({ message: 'Item Code and Name are required', indicator: 'red' });
		return;
	}

	const method = currentItem ? 'update_master_record' : 'create_master_record';
	const args = {
		doctype: 'Item',
		item_code: itemCode,
		item_name: itemName,
		item_group: itemGroup || 'General',
		standard_rate: parseFloat(rate) || 0
	};

	if (currentItem) {
		args.name = currentItem.name;
	}

	frappe.call({
		method: `store_management.api.${method}`,
		args: args,
		callback: function(response) {
			frappe.show_alert({ message: `Item ${currentItem ? 'updated' : 'created'} successfully`, indicator: 'green' });
			closeModal();
			loadItems();
		}
	});
}

function deleteItem(name) {
	if (!confirm('Are you sure you want to delete this item?')) return;

	frappe.call({
		method: 'store_management.api.delete_master_record',
		args: { doctype: 'Item', name: name },
		callback: function(response) {
			frappe.show_alert({ message: 'Item deleted successfully', indicator: 'green' });
			loadItems();
		}
	});
}

function openModal() {
	document.getElementById('item-modal').classList.add('open');
	document.getElementById('modal-backdrop').classList.add('open');
}

function closeModal() {
	document.getElementById('item-modal').classList.remove('open');
	document.getElementById('modal-backdrop').classList.remove('open');
	currentItem = null;
}

function escapeHtml(str) {
	return String(str || '')
		.replace(/&/g, '&amp;')
		.replace(/</g, '&lt;')
		.replace(/>/g, '&gt;')
		.replace(/"/g, '&quot;')
		.replace(/'/g, '&#39;');
}

function escapeAttr(str) {
	return String(str || '')
		.replace(/"/g, '&quot;')
		.replace(/'/g, '&#39;');
}
</script>
{% endif %}
{% endblock %}
